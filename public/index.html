<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgeborne Bingo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-main">
        <div class="hero-aside">
          <div class="hero-meta">
            <span class="hero-meta__dates">18 Mar 2026 — 1 Apr 2026 &nbsp;·&nbsp; GMT+0</span>
            <span class="hero-meta__countdown" id="hero-countdown" aria-live="polite" aria-atomic="true"></span>
            <a class="hero-meta__discord" href="https://discord.gg/ja2A5SpB" target="_blank" rel="noopener noreferrer">
              <svg class="discord-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.031.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
              </svg>
              Discord
            </a>
          </div>
          <div class="hero-tools" aria-label="Event details and scoring">
            <div class="info-chip">
              <button class="info-chip__button" type="button" aria-label="Overview">
                <img src="assets/icon-overview.svg" alt="" />
                <span class="sr-only">Overview</span>
              </button>
              <div class="info-popover">
                <p class="info-popover__label">Overview</p>
                <div class="info-popover__content info-popover__content--stats" id="stats-grid"></div>
              </div>
            </div>
            <div class="info-chip">
              <button class="info-chip__button" type="button" aria-label="Scoring">
                <img src="assets/icon-weighting.svg" alt="" />
                <span class="sr-only">Scoring</span>
              </button>
              <div class="info-popover">
                <p class="info-popover__label">Scoring</p>
                <div class="info-popover__content info-popover__content--rules">
                  <div class="rule-card rule-card--compact">
                    <h3>Rating Formula</h3>
                    <ul id="base-rules"></ul>
                  </div>
                  <div class="rule-card rule-card--compact">
                    <h3>Rating Notes</h3>
                    <ul id="decay-rules"></ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="hero-copy">
          <h1 class="sr-only">Forgeborne Bingo</h1>
          <img class="hero-logo" src="assets/logonobg.png" alt="" aria-hidden="true" loading="eager">
        </div>
      </div>
    </header>

    <main>
      <section class="panel tabs-panel panel--nav">
        <div class="tabs-panel__well">
          <div class="tabs tabs--primary" role="tablist" aria-label="Primary views">
            <button class="tab-button is-active" id="tab-teams" type="button" role="tab" aria-selected="true" aria-controls="panel-teams" data-tab="teams">Teams</button>
            <div class="nav-board-wrap" tabindex="0" aria-label="Bingo Board" aria-describedby="board-coming-soon">
              <div class="nav-board-placeholder" aria-hidden="true">
                <span class="nav-board-placeholder__shine" aria-hidden="true"></span>
                <img class="nav-board-placeholder__icon" src="assets/icon-board.svg" alt="" width="30" height="30" loading="lazy">
              </div>
              <span class="nav-board-placeholder__tooltip" id="board-coming-soon" role="tooltip">Coming soon</span>
            </div>
            <button class="tab-button" id="tab-participants" type="button" role="tab" aria-selected="false" aria-controls="panel-participants" data-tab="participants">Roster</button>
          </div>
        </div>
      </section>

      <section class="panel tab-panel panel--section panel--teams is-active" id="panel-teams" role="tabpanel" aria-labelledby="tab-teams" data-panel="teams">
        <div class="teams-grid" id="teams-grid"></div>
      </section>

      <section class="panel tab-panel panel--section panel--roster" id="panel-participants" role="tabpanel" aria-labelledby="tab-participants" data-panel="participants" hidden>
        <div class="participants-list" id="participants-list"></div>
      </section>
    </main>
  </div>

  <template id="team-template">
    <article class="team-card">
      <div class="team-card__art" aria-hidden="true">
        <img class="team-card__art-layer team-card__art-layer--primary" src="" alt="" loading="lazy" hidden>
        <img class="team-card__art-layer team-card__art-layer--secondary" src="" alt="" loading="lazy" hidden>
      </div>
      <div class="team-card__header">
        <div class="team-card__identity">
          <div class="team-card__crest" aria-hidden="true">
            <img class="team-card__crest-icon" src="" alt="" width="38" height="38" loading="lazy">
          </div>
          <div class="team-card__titleblock">
            <p class="team-label"></p>
            <h3 class="team-name"></h3>
            <p class="team-card__flavor"></p>
          </div>
        </div>
        <div class="team-card__meta">
          <div class="team-total">
            <span class="team-total__label">Total Rating</span>
            <strong class="team-total__value"></strong>
          </div>
          <div class="team-card__badges">
            <span class="team-card__badge">
              <span class="team-player-count"></span>
            </span>
            <span class="team-card__badge">
              <span class="team-average-rating"></span>
            </span>
          </div>
        </div>
      </div>

      <div class="team-card__highlights">
        <div class="team-highlight team-highlight--boss">
          <span class="team-highlight__eyebrow">Popular Boss</span>
          <div class="team-highlight__body">
            <span class="team-highlight__icon-wrap" hidden>
              <img class="team-highlight__icon team-highlight__icon--boss" src="" alt="" width="18" height="18" loading="lazy">
            </span>
            <div class="team-highlight__copy">
              <strong class="team-highlight__value team-boss-focus"></strong>
              <span class="team-highlight__meta team-boss-meta"></span>
            </div>
          </div>
        </div>

        <div class="team-highlight team-highlight--skill">
          <span class="team-highlight__eyebrow">Popular Skill</span>
          <div class="team-highlight__body">
            <span class="team-highlight__icon-wrap" hidden>
              <img class="team-highlight__icon team-highlight__icon--skill" src="" alt="" width="18" height="18" loading="lazy">
            </span>
            <div class="team-highlight__copy">
              <strong class="team-highlight__value team-skill-focus"></strong>
              <span class="team-highlight__meta team-skill-meta"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="team-roster">
        <div class="roster-header">
          <span class="roster-col__name">Player</span>
          <span class="roster-col__rank">Rank</span>
          <span class="roster-col__rating">Rating</span>
          <span class="roster-col__share">Share</span>
        </div>
      </div>
    </article>
  </template>

  <template id="player-template">
    <div class="player-row">
        <div class="player-row__name-line">
          <img class="player-type-badge" src="" alt="" width="16" height="16">
          <p class="player-name"></p>
          <div class="participant-badges player-row__badges">
          <span class="participant-favorite-badge participant-favorite-badge--boss" hidden tabindex="0">
            <span class="participant-favorite-badge__icon-wrap">
              <img class="participant-favorite-badge__icon participant-favorite-badge__icon--boss" src="" alt="" loading="lazy">
            </span>
          </span>
          <span class="participant-favorite-badge participant-favorite-badge--skill" hidden tabindex="0">
            <span class="participant-favorite-badge__icon-wrap">
              <img class="participant-favorite-badge__icon participant-favorite-badge__icon--skill" src="" alt="" loading="lazy">
            </span>
          </span>
        </div>
      </div>
      <div class="player-row__footer">
        <span class="player-row__rank"><strong class="metric-overall-rank"></strong></span>
        <span class="player-row__rating metric-total"></span>
        <span class="player-row__share metric-share"></span>
      </div>
    </div>
  </template>

  <template id="participant-template">
    <article class="participant-card">
      <div class="participant-card__art" aria-hidden="true">
      </div>
      <!-- Single header row -->
      <div class="participant-card__top">
        <div class="participant-card__identity">
          <span class="participant-team-signet" aria-hidden="true">
            <img class="participant-team-signet__icon" src="" alt="" width="18" height="18" loading="lazy">
          </span>
          <img class="player-type-badge" src="" alt="" width="16" height="16">
          <h3 class="participant-name"></h3>
          <div class="participant-badges">
            <span class="participant-favorite-badge participant-favorite-badge--boss" hidden tabindex="0">
              <span class="participant-favorite-badge__icon-wrap">
                <img class="participant-favorite-badge__icon participant-favorite-badge__icon--boss" src="" alt="" loading="lazy">
              </span>
            </span>
            <span class="participant-favorite-badge participant-favorite-badge--skill" hidden tabindex="0">
              <span class="participant-favorite-badge__icon-wrap">
                <img class="participant-favorite-badge__icon participant-favorite-badge__icon--skill" src="" alt="" loading="lazy">
              </span>
            </span>
          </div>
        </div>

        <div class="participant-card__summary">
          <div class="participant-card__scores">
            <div class="participant-card__metric participant-card__metric--ehb">
              <button class="score-toggle score-toggle--ehb" type="button" aria-expanded="false" data-controls="ehb">
                <span class="score-toggle__label">
                  <img class="metric-icon" src="assets/wom/metrics/combat.png" alt="" width="13" height="13" loading="lazy" aria-hidden="true">
                  <span>Combat</span>
                </span>
                <span class="participant-ehb-score"></span>
              </button>
              <div class="participant-inline-formula participant-inline-formula--ehb">
                <div class="participant-inline-formula__segment participant-inline-formula__segment--foundation">
                  <span class="participant-inline-formula__label">Lifetime Bonus</span>
                  <div class="participant-inline-formula__value-group">
                    <span class="participant-ehb"></span>
                    <span class="score-row__rank participant-ehb-rank"></span>
                    <span class="participant-inline-formula__op participant-inline-formula__op--inline" aria-hidden="true">/</span>
                    <strong class="participant-ehb-bonus"></strong>
                  </div>
                </div>
                <span class="participant-inline-formula__op" aria-hidden="true">+</span>
                <div class="participant-inline-formula__segment participant-inline-formula__segment--recent">
                  <span class="participant-inline-formula__label">Recent</span>
                  <span class="participant-inline-formula__value participant-ehb-gained"></span>
                </div>
                <span class="participant-inline-formula__op participant-inline-formula__op--eq" aria-hidden="true">=</span>
              </div>
            </div>

            <span class="participant-card__op" aria-hidden="true">+</span>

            <div class="participant-card__metric participant-card__metric--ehp">
              <button class="score-toggle score-toggle--ehp" type="button" aria-expanded="false" data-controls="ehp">
                <span class="score-toggle__label">
                  <img class="metric-icon" src="assets/wom/metrics/overall.png" alt="" width="13" height="13" loading="lazy" aria-hidden="true">
                  <span>Skilling</span>
                </span>
                <span class="participant-ehp-score"></span>
              </button>
              <div class="participant-inline-formula participant-inline-formula--ehp">
                <div class="participant-inline-formula__segment participant-inline-formula__segment--foundation">
                  <span class="participant-inline-formula__label">Lifetime Bonus / 3</span>
                  <div class="participant-inline-formula__value-group">
                    <span class="participant-ehp"></span>
                    <span class="score-row__rank participant-ehp-rank"></span>
                    <span class="participant-inline-formula__op participant-inline-formula__op--inline" aria-hidden="true">/</span>
                    <strong class="participant-ehp-bonus"></strong>
                  </div>
                </div>
                <span class="participant-inline-formula__op" aria-hidden="true">+</span>
                <div class="participant-inline-formula__segment participant-inline-formula__segment--recent">
                  <span class="participant-inline-formula__label">Recent</span>
                  <span class="participant-inline-formula__value participant-ehp-gained"></span>
                </div>
                <span class="participant-inline-formula__op participant-inline-formula__op--eq" aria-hidden="true">=</span>
              </div>
            </div>

            <span class="participant-card__op participant-card__op--eq" aria-hidden="true">=</span>
          </div>

          <div class="participant-card__totals">
            <div class="participant-total"></div>
            <span class="participant-rank-badge"><span class="participant-rank-badge__prefix">#</span><strong class="participant-overall-rank"></strong></span>
          </div>
        </div>
      </div>

      <!-- Score breakdowns — toggled by JS -->
      <div class="participant-card__body">

        <div class="score-breakdown score-breakdown--ehb" data-breakdown="ehb" hidden>
          <div class="breakdown-header">
            <span class="breakdown-header__icon" aria-hidden="true">
               <img class="metric-icon" src="assets/wom/metrics/combat.png" alt="" width="13" height="13" loading="lazy">
            </span>
            <span class="breakdown-header__name">Boss</span>
            <span class="breakdown-header__activity">Kills (Lifetime + Recent)</span>
            <span class="breakdown-header__metric">EHB (Lifetime + Recent)</span>
          </div>
          <ul class="breakdown-list breakdown-list--ehb"></ul>
        </div>

        <div class="score-breakdown score-breakdown--ehp" data-breakdown="ehp" hidden>
          <div class="breakdown-header">
            <span class="breakdown-header__icon" aria-hidden="true">
               <img class="metric-icon" src="assets/wom/metrics/overall.png" alt="" width="13" height="13" loading="lazy">
            </span>
            <span class="breakdown-header__name">Skill</span>
            <span class="breakdown-header__activity">XP (Lifetime + Recent)</span>
            <span class="breakdown-header__metric">EHP (Lifetime + Recent)</span>
          </div>
          <ul class="breakdown-list breakdown-list--ehp"></ul>
        </div>

      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
